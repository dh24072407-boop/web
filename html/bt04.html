<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai tap 4</title>
</head>
<body>

    <h2 align="center">KẾT QUẢ HỌC TẬP</h2>

    <table border="1" width="80%" align="center" cellspacing="0" cellpadding="5">
        
        <thead>
            <tr bgcolor="#d3d3d3" align="center">
                <th rowspan="2">Họ tên</th>
                <th colspan="3">Môn học</th>
                <th rowspan="2">Kết quả</th>
            </tr>
            <tr bgcolor="#d3d3d3" align="center">
                <th>Toán</th>
                <th>Văn</th>
                <th>Ngoại ngữ</th>
            </tr>
        </thead>

        <tfoot>
            <tr>
                <td colspan="4"><b>Tổng số học sinh đạt</b></td>
                <td align="center">2</td>
            </tr>
        </tfoot>

        <tbody>
            <tr>
                <td>Trần Văn Thành</td>
                <td align="center">8</td>
                <td align="center">5</td>
                <td align="center">7</td>
                <td align="center" bgcolor="yellow" style="color: black;"><b>Đạt</b></td>
            </tr>
            <tr>
                <td>Lê Thanh Sơn</td>
                <td align="center">4</td>
                <td align="center">9</td>
                <td align="center">6</td>
                <td align="center" bgcolor="red" style="color: white;"><b>Không đạt</b></td>
            </tr>
            <tr>
                <td>Nguyễn Thị Tuyết</td>
                <td align="center">8</td>
                <td align="center">9</td>
                <td align="center">5</td>
                <td align="center" bgcolor="yellow" style="color: black;"><b>Đạt</b></td>
            </tr>
        </tbody>

    </table>

</body>
</html>
